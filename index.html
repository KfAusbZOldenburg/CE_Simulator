<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight - 170;
}

window.addEventListener("resize", resizeCanvas);
window.addEventListener("orientationchange", resizeCanvas);

resizeCanvas();

function screenToWorld(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();

  const canvasX =
    (clientX - rect.left) * (canvas.width / rect.width);

  const canvasY =
    (clientY - rect.top) * (canvas.height / rect.height);

  return {
    x: Math.round(camera.x + (canvasX - canvas.width / 2) / camera.zoom),
    y: Math.round(camera.y + (canvasY - canvas.height / 2) / camera.zoom)
  };
}


// rechte Maustaste zum Navigieren wie Steuerkreuz
canvas.addEventListener("contextmenu", (e) => {
  e.preventDefault();
});

canvas.addEventListener("mousedown", (e) => {
  if (e.button !== 2) return;

  draggingMouse = true;
  followTruck = false;

  lastMouseX = e.clientX;
  lastMouseY = e.clientY;
});

canvas.addEventListener("mousemove", (e) => {
  const rect = canvas.getBoundingClientRect();

  if (draggingMouse) {
    const dx =
      (e.clientX - lastMouseX) *
      (canvas.width / rect.width);

    const dy =
      (e.clientY - lastMouseY) *
      (canvas.height / rect.height);

    camera.x -= dx / camera.zoom;
    camera.y -= dy / camera.zoom;

    lastMouseX = e.clientX;
    lastMouseY = e.clientY;
  }

  updateCoordBox(e.clientX, e.clientY);
});

canvas.addEventListener("mouseup", (e) => {
  if (e.button === 2) {
    draggingMouse = false;
  }
});

canvas.addEventListener("mouseleave", () => {
  draggingMouse = false;
});

canvas.addEventListener("wheel", (e) => {
  e.preventDefault();

  // Weltposition unter der Maus VOR dem Zoom merken
  const beforeZoom = screenToWorld(e.clientX, e.clientY);

  // Mausrad hoch = reinzoomen, runter = rauszoomen
  const zoomFactor = e.deltaY < 0 ? 1.1 : 0.9;

  camera.zoom *= zoomFactor;

  // Grenzen für den Zoom
  camera.zoom = Math.max(0.2, Math.min(camera.zoom, 2.5));

  // Weltposition unter der Maus NACH dem Zoom berechnen
  const afterZoom = screenToWorld(e.clientX, e.clientY);

  // Kamera so verschieben, dass unter der Maus derselbe Punkt bleibt
  camera.x += beforeZoom.x - afterZoom.x;
  camera.y += beforeZoom.y - afterZoom.y;

  // Automatisches Folgen ausschalten
  followTruck = false;

}, { passive: false });
canvas.addEventListener("touchstart", (e) => {

  if (e.touches.length === 1) {

    draggingMap = true;

    lastTouchX = e.touches[0].clientX;
    lastTouchY = e.touches[0].clientY;
  }

}, { passive:false });



canvas.addEventListener("touchmove", (e) => {

  if (draggingMap && e.touches.length === 1) {

    const touch = e.touches[0];

    const dx = touch.clientX - lastTouchX;
    const dy = touch.clientY - lastTouchY;

    followTruck = false;

    camera.x -= dx / camera.zoom;
    camera.y -= dy / camera.zoom;

    lastTouchX = touch.clientX;
    lastTouchY = touch.clientY;
  }

}, { passive:false });

canvas.addEventListener("touchstart", (e) => {
  if (e.touches.length === 2) {
    e.preventDefault();

    draggingMap = false;

    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;

    pinchStartDistance = Math.hypot(dx, dy);
    startZoom = camera.zoom;
  }
}, { passive: false });

canvas.addEventListener("touchmove", (e) => {
  if (e.touches.length === 2 && pinchStartDistance !== null) {
    e.preventDefault();

    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;

    const currentDistance = Math.hypot(dx, dy);
    const zoomFactor = currentDistance / pinchStartDistance;

    camera.zoom = startZoom * zoomFactor;
    camera.zoom = Math.max(0.3, Math.min(camera.zoom, 1.8));
  }
}, { passive: false });

canvas.addEventListener("touchend", (e) => {
  if (e.touches.length < 2) {
    pinchStartDistance = null;
  }
});

canvas.addEventListener("touchend", () => {
  draggingMap = false;
});

function holdButton(button, setter) {
  button.addEventListener("mousedown", () => setter(true));
  button.addEventListener("mouseup", () => setter(false));
  button.addEventListener("mouseleave", () => setter(false));

  button.addEventListener("touchstart", e => {
    e.preventDefault();
    setter(true);
  }, { passive: false });

  button.addEventListener("touchend", e => {
    e.preventDefault();
    setter(false);
  });

  button.addEventListener("touchcancel", () => setter(false));
}

function updateGearButtons() {

function getPointerAngle(e) {
  const rect = steeringWheel.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;

  return Math.atan2(e.clientY - cy, e.clientX - cx) * 180 / Math.PI;
}

function updateWheelVisual() {
 document.getElementById("steeringWheelImg").style.transform =
  "rotate(" + wheelAngle + "deg)";
  steeringValue = wheelAngle / maxWheelAngle;
  truck.steeringAngle = steeringValue * 0.8;
  steerDisplay.innerText = "Lenkrad: " + Math.round(wheelAngle) + "°";
}

steeringWheel.addEventListener("pointerdown", e => {
  wheelDragging = true;
  lastPointerAngle = getPointerAngle(e);
  steeringWheel.setPointerCapture(e.pointerId);
});

steeringWheel.addEventListener("pointermove", e => {
  if (!wheelDragging) return;

  const currentAngle = getPointerAngle(e);
  let diff = currentAngle - lastPointerAngle;

  if (diff > 180) diff -= 360;
  if (diff < -180) diff += 360;

  wheelAngle += diff;
  wheelAngle = Math.max(-maxWheelAngle, Math.min(maxWheelAngle, wheelAngle));

  lastPointerAngle = currentAngle;
  updateWheelVisual();
});

steeringWheel.addEventListener("pointerup", e => {
  wheelDragging = false;
  steeringWheel.releasePointerCapture(e.pointerId);
});

steeringWheel.addEventListener("pointercancel", () => {
  wheelDragging = false;
});

speedSlider.addEventListener("input", () => {

function updateIntro() {
  if (!introActive) return;

  const elapsed = performance.now() - introStartTime;
const hitchX =
  truck.x - Math.cos(truck.angle) * truck.length / 2;

const hitchY =
  truck.y - Math.sin(truck.angle) * truck.length / 2;

const startHoldDuration = 1000;
const moveToRampDuration = 1000;
const rampHoldDuration = 1000;
const returnDuration = 650;

const totalDuration =
  startHoldDuration +
  moveToRampDuration +
  rampHoldDuration +
  returnDuration;

  function easeInOut(t) {
    return t < 0.5
      ? 2 * t * t
      : 1 - Math.pow(-2 * t + 2, 2) / 2;
  }

// Startposition halten
if (elapsed < startHoldDuration) {
  return;
}

// Zur Rampe fahren
if (elapsed < startHoldDuration + moveToRampDuration) {

  const t = easeInOut(
    (elapsed - startHoldDuration) /
    moveToRampDuration
  );

  camera.x =
    hitchX +
    (introCameraTarget.x - hitchX) * t;

  camera.y =
    hitchY +
    (introCameraTarget.y - hitchY) * t;

  return;
}

// Rampe halten
if (
  elapsed <
  startHoldDuration +
  moveToRampDuration +
  rampHoldDuration
) {

  camera.x = introCameraTarget.x;
  camera.y = introCameraTarget.y;

  return;
}

// Zurück zur Kupplung
if (elapsed < totalDuration) {

  const t = easeInOut(
    (
      elapsed -
      startHoldDuration -
      moveToRampDuration -
      rampHoldDuration
    ) / returnDuration
  );

  camera.x =
    introCameraTarget.x +
    (hitchX - introCameraTarget.x) * t;

  camera.y =
    introCameraTarget.y +
    (hitchY - introCameraTarget.y) * t;

  return;
}
introActive = false;

camera.x = hitchX;
camera.y = hitchY;
camera.zoom = introCameraStart.zoom;

if (introBox) {
  introBox.style.display = "none";
}

followTruck = true;
}

function normalizeAngle(angle) {
  while (angle > Math.PI) angle -= Math.PI * 2;
  while (angle < -Math.PI) angle += Math.PI * 2;
  return angle;
}

function angleLerp(current, target, factor) {
  const diff = normalizeAngle(target - current);
  return current + diff * factor;

}

function localToWorld(obj, localX, localY) {
  return {
    x: obj.x + Math.cos(obj.angle) * localX - Math.sin(obj.angle) * localY,
    y: obj.y + Math.sin(obj.angle) * localX + Math.cos(obj.angle) * localY
  };
}

function getTrailerRearCenter() {

function bezierPoint(p0, p1, p2, t) {
  const mt = 1 - t;

  return {
    x: mt * mt * p0.x + 2 * mt * t * p1.x + t * t * p2.x,
    y: mt * mt * p0.y + 2 * mt * t * p1.y + t * t * p2.y
  };
}

function buildLeftTriggerLine() {
  const points = [];
  const { leftTop, leftBottom } = markingLimits;

  const control = {
    x: leftBottom.x,
    y: leftTop.y
  };

  for (let i = 0; i <= 80; i++) {
    const t = i / 80;
    points.push(bezierPoint(leftTop, control, leftBottom, t));
  }

  for (let y = leftBottom.y + 5; y <= world.height; y += 5) {
    points.push({
      x: leftBottom.x,
      y: y
    });
  }

  return points;
}

function buildRightTriggerLine() {
  const points = [];
  const { rightTop, rightBottom } = markingLimits;

  const control = {
    x: rightBottom.x,
    y: rightTop.y
  };

  for (let i = 0; i <= 80; i++) {
    const t = i / 80;
    points.push(bezierPoint(rightTop, control, rightBottom, t));
  }

  for (let y = rightBottom.y + 5; y <= world.height; y += 5) {
    points.push({
      x: rightBottom.x,
      y: y
    });
  }

  return points;
}

function drawPolyline(points, color, width) {
  if (!points.length) return;

  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth = width;
  ctx.beginPath();
  ctx.moveTo(points[0].x, points[0].y);

  for (let i = 1; i < points.length; i++) {
    ctx.lineTo(points[i].x, points[i].y);
  }

  ctx.stroke();
  ctx.restore();
}

function getBoundaryXAtY(linePoints, y) {
  for (let i = 0; i < linePoints.length - 1; i++) {
    const p1 = linePoints[i];
    const p2 = linePoints[i + 1];

    const minY = Math.min(p1.y, p2.y);
    const maxY = Math.max(p1.y, p2.y);

    if (y >= minY && y <= maxY) {
      const dy = p2.y - p1.y;

      if (Math.abs(dy) < 0.0001) {
        return p1.x;
      }

      const t = (y - p1.y) / dy;
      return p1.x + (p2.x - p1.x) * t;
    }
  }

  return null;
}

function distancePointToSegment(px, py, ax, ay, bx, by) {
  const abx = bx - ax;
  const aby = by - ay;
  const apx = px - ax;
  const apy = py - ay;

  const abLengthSq = abx * abx + aby * aby;

  let t = 0;

  if (abLengthSq > 0) {
    t = (apx * abx + apy * aby) / abLengthSq;
    t = Math.max(0, Math.min(1, t));
  }

  const closestX = ax + abx * t;
  const closestY = ay + aby * t;

  return Math.hypot(px - closestX, py - closestY);
}

function pointInPolygon(point, polygon) {
  let inside = false;

  for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
    const xi = polygon[i].x;
    const yi = polygon[i].y;
    const xj = polygon[j].x;
    const yj = polygon[j].y;

    const intersect =
      (yi > point.y) !== (yj > point.y) &&
      point.x < ((xj - xi) * (point.y - yi)) / (yj - yi) + xi;

    if (intersect) inside = !inside;
  }

  return inside;
}

function circleIntersectsPolygon(circle, polygon) {
  if (pointInPolygon({ x: circle.x, y: circle.y }, polygon)) {
    return true;
  }

  for (let i = 0; i < polygon.length; i++) {
    const a = polygon[i];
    const b = polygon[(i + 1) % polygon.length];

    if (
      distancePointToSegment(
        circle.x,
        circle.y,
        a.x,
        a.y,
        b.x,
        b.y
      ) <= circle.radius
    ) {
      return true;
    }
  }

  return false;
}

function checkCollisionZones() {
  const truckPoly = getCorners(truck);
  const trailerPoly = getCorners(trailer);

  for (const zone of collisionZones) {
    const zonePoly = [
      { x: zone.left,  y: zone.top },
      { x: zone.right, y: zone.top },
      { x: zone.right, y: zone.bottom },
      { x: zone.left,  y: zone.bottom }
    ];

    if (
      polygonsCollide(truckPoly, zonePoly) ||
      polygonsCollide(trailerPoly, zonePoly)
    ) {
      return true;
    }
  }

  return false;
}

function checkRoundCollisionZones() {
  const truckPoly = getCorners(truck);
  const trailerPoly = getCorners(trailer);

  for (const zone of roundCollisionZones) {
    if (
      circleIntersectsPolygon(zone, truckPoly) ||
      circleIntersectsPolygon(zone, trailerPoly)
    ) {
      return true;
    }
  }

  return false;
}
function updateTrailer() {
  const hitchX =
    truck.x - Math.cos(truck.angle) * truck.length / 2;

  const hitchY =
    truck.y - Math.sin(truck.angle) * truck.length / 2;

  const frontAxleOffset = trailer.length / 2 - 25;

  // aktueller Drehschemelpunkt am Anhänger
  const currentFrontX =
    trailer.x + Math.cos(trailer.angle) * frontAxleOffset;

  const currentFrontY =
    trailer.y + Math.sin(trailer.angle) * frontAxleOffset;

  // Richtung vom Drehschemel zur Kupplung
  const dx = hitchX - currentFrontX;
  const dy = hitchY - currentFrontY;

  trailer.drawbarAngle = Math.atan2(dy, dx);

  // neuer Drehschemelpunkt mit fester Deichsellänge
  const newFrontAxleX =
    hitchX - Math.cos(trailer.drawbarAngle) * trailer.drawbarLength;

  const newFrontAxleY =
    hitchY - Math.sin(trailer.drawbarAngle) * trailer.drawbarLength;

  // Anhänger richtet sich direkt auf den neuen Drehschemelpunkt aus
  trailer.angle = Math.atan2(
    newFrontAxleY - trailer.y,
    newFrontAxleX - trailer.x
  );

  // Anhängerposition vom Drehschemelpunkt zurückrechnen
  trailer.x =
    newFrontAxleX - Math.cos(trailer.angle) * frontAxleOffset;

  trailer.y =
    newFrontAxleY - Math.sin(trailer.angle) * frontAxleOffset;

  trailer.frontAxleX = newFrontAxleX;
  trailer.frontAxleY = newFrontAxleY;

  trailer.rearAxleX =
    trailer.x + Math.cos(trailer.angle) * -80;

  trailer.rearAxleY =
    trailer.y + Math.sin(trailer.angle) * -80;
}
function getCorners(obj) {
  const c = Math.cos(obj.angle);
  const s = Math.sin(obj.angle);

  let hl = obj.length / 2;
  let hw = obj.width / 2;

  // LKW-Kollisionsbox enger machen
  // Spiegel / leere Sprite-Ränder werden ignoriert
  if (obj === truck) {
    hw -= 12; // links/rechts je 12 px kleiner


  }

  return [
    { x: obj.x + c * hl - s * hw, y: obj.y + s * hl + c * hw },
    { x: obj.x + c * hl + s * hw, y: obj.y + s * hl - c * hw },
    { x: obj.x - c * hl + s * hw, y: obj.y - s * hl - c * hw },
    { x: obj.x - c * hl - s * hw, y: obj.y - s * hl + c * hw }
  ];
}
function project(axis, points) {
  let min = points[0].x * axis.x + points[0].y * axis.y;
  let max = min;

  for (const p of points) {
    const val = p.x * axis.x + p.y * axis.y;
    min = Math.min(min, val);
    max = Math.max(max, val);
  }

  return { min, max };
}

function polygonsCollide(a, b) {
  const polygons = [a, b];

  for (const poly of polygons) {
    for (let i = 0; i < poly.length; i++) {
      const p1 = poly[i];
      const p2 = poly[(i + 1) % poly.length];

      const edge = { x: p2.x - p1.x, y: p2.y - p1.y };
      const axis = { x: -edge.y, y: edge.x };

      const len = Math.hypot(axis.x, axis.y);
      axis.x /= len;
      axis.y /= len;

      const pa = project(axis, a);
      const pb = project(axis, b);

      if (pa.max < pb.min || pb.max < pa.min) {
        return false;
      }
    }
  }

  return true;
}

    distanceToRamp >= task20m.minStopDistance &&

function screenToWorld(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();

  const canvasX =
    (clientX - rect.left) * (canvas.width / rect.width);

  const canvasY =
    (clientY - rect.top) * (canvas.height / rect.height);

  const worldX =
    (canvasX - canvas.width / 2) / camera.zoom + camera.x;

  const worldY =
    (canvasY - canvas.height / 2) / camera.zoom + camera.y;

  return {
    x: Math.round(worldX),
    y: Math.round(worldY)
  };
}

  if (e.touches.length === 1) {

    );
  }
}, { passive: false });

canvas.addEventListener("wheel", (e) => {
  e.preventDefault();

  // Weltposition unter der Maus VOR dem Zoom merken
  const beforeZoom = screenToWorld(e.clientX, e.clientY);

  // Mausrad hoch = reinzoomen, runter = rauszoomen
  const zoomFactor = e.deltaY < 0 ? 1.1 : 0.9;

  camera.zoom *= zoomFactor;

  // Grenzen für den Zoom
  camera.zoom = Math.max(0.2, Math.min(camera.zoom, 2.5));

  // Weltposition unter der Maus NACH dem Zoom berechnen
  const afterZoom = screenToWorld(e.clientX, e.clientY);

  // Kamera so verschieben, dass unter der Maus derselbe Punkt bleibt
  camera.x += beforeZoom.x - afterZoom.x;
  camera.y += beforeZoom.y - afterZoom.y;

  // Automatisches Folgen ausschalten
  followTruck = false;

canvas.addEventListener("touchstart", (e) => {

    camera.zoom = startZoom * zoomFactor;
    camera.zoom = Math.max(0.3, Math.min(camera.zoom, 1.8));

function holdButton(button, setter) {
  button.addEventListener("mousedown", () => setter(true));
  button.addEventListener("mouseup", () => setter(false));
  button.addEventListener("mouseleave", () => setter(false));

  button.addEventListener("touchstart", e => {
    e.preventDefault();
    setter(true);
  }, { passive: false });

  button.addEventListener("touchend", e => {
    e.preventDefault();
    setter(false);
  });

  button.addEventListener("touchcancel", () => setter(false));
}

function getPointerAngle(e) {
  const rect = steeringWheel.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;

  return Math.atan2(e.clientY - cy, e.clientX - cx) * 180 / Math.PI;
}

function updateWheelVisual() {
 document.getElementById("steeringWheelImg").style.transform =
  "rotate(" + wheelAngle + "deg)";
  steeringValue = wheelAngle / maxWheelAngle;
  truck.steeringAngle = steeringValue * 0.8;
  steerDisplay.innerText = "Lenkrad: " + Math.round(wheelAngle) + "°";
}

steeringWheel.addEventListener("pointerdown", e => {
  wheelDragging = true;
  lastPointerAngle = getPointerAngle(e);
  steeringWheel.setPointerCapture(e.pointerId);
});

steeringWheel.addEventListener("pointermove", e => {
  if (!wheelDragging) return;

  const currentAngle = getPointerAngle(e);
  let diff = currentAngle - lastPointerAngle;

  if (diff > 180) diff -= 360;
  if (diff < -180) diff += 360;

  wheelAngle += diff;
  wheelAngle = Math.max(-maxWheelAngle, Math.min(maxWheelAngle, wheelAngle));

  lastPointerAngle = currentAngle;
  updateWheelVisual();
});

steeringWheel.addEventListener("pointerup", e => {
  wheelDragging = false;
  steeringWheel.releasePointerCapture(e.pointerId);
});

steeringWheel.addEventListener("pointercancel", () => {
  wheelDragging = false;
});

function normalizeAngle(angle) {
  while (angle > Math.PI) angle -= Math.PI * 2;
  while (angle < -Math.PI) angle += Math.PI * 2;
  return angle;
}

function angleLerp(current, target, factor) {
  const diff = normalizeAngle(target - current);
  return current + diff * factor;
}

function localToWorld(obj, localX, localY) {
  return {
    x: obj.x + Math.cos(obj.angle) * localX - Math.sin(obj.angle) * localY,
    y: obj.y + Math.sin(obj.angle) * localX + Math.cos(obj.angle) * localY
  };
}


function getWheelTriggerPoints() {
  const points = [];

  // LKW Hinterachse
  points.push(localToWorld(truck, -95, -truck.width / 3 - 2));
  points.push(localToWorld(truck, -95,  truck.width / 3 + 2));

  // LKW Vorderachse
  points.push(localToWorld(truck, 130, -truck.width / 3 - 2));
  points.push(localToWorld(truck, 130,  truck.width / 3 + 2));

  // Anhänger Hinterachse
  points.push(localToWorld(trailer, -80, -trailer.width / 3 - 10));
  points.push(localToWorld(trailer, -80,  trailer.width / 3 + 10));

  // Anhänger Vorderachse / Drehschemelachse
  const frontAxleX = trailer.length / 2 - 25;
  const axleCenter = localToWorld(trailer, frontAxleX, 0);

  points.push({
    x: axleCenter.x + Math.cos(trailer.drawbarAngle + Math.PI / 2) * (trailer.width / 3 + 10),
    y: axleCenter.y + Math.sin(trailer.drawbarAngle + Math.PI / 2) * (trailer.width / 3 + 10)
  });

  points.push({
    x: axleCenter.x + Math.cos(trailer.drawbarAngle - Math.PI / 2) * (trailer.width / 3 + 10),
    y: axleCenter.y + Math.sin(trailer.drawbarAngle - Math.PI / 2) * (trailer.width / 3 + 10)
  });

  return points;
}

function bezierPoint(p0, p1, p2, t) {
  const mt = 1 - t;

  return {
    x: mt * mt * p0.x + 2 * mt * t * p1.x + t * t * p2.x,
    y: mt * mt * p0.y + 2 * mt * t * p1.y + t * t * p2.y
  };
}

function buildLeftTriggerLine() {
  const points = [];
  const { leftTop, leftBottom } = markingLimits;

  const control = {
    x: leftBottom.x,
    y: leftTop.y
  };

  for (let i = 0; i <= 80; i++) {
    const t = i / 80;
    points.push(bezierPoint(leftTop, control, leftBottom, t));
  }

  for (let y = leftBottom.y + 5; y <= world.height; y += 5) {
    points.push({
      x: leftBottom.x,
      y: y
    });
  }

  return points;
}

function buildRightTriggerLine() {
  const points = [];
  const { rightTop, rightBottom } = markingLimits;

  const control = {
    x: rightBottom.x,
    y: rightTop.y
  };

  for (let i = 0; i <= 80; i++) {
    const t = i / 80;
    points.push(bezierPoint(rightTop, control, rightBottom, t));
  }

  for (let y = rightBottom.y + 5; y <= world.height; y += 5) {
    points.push({
      x: rightBottom.x,
      y: y
    });
  }

  return points;
}

function drawPolyline(points, color, width) {
  if (!points.length) return;

  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth = width;
  ctx.beginPath();
  ctx.moveTo(points[0].x, points[0].y);

  for (let i = 1; i < points.length; i++) {
    ctx.lineTo(points[i].x, points[i].y);
  }

  ctx.stroke();
  ctx.restore();
}

function getBoundaryXAtY(linePoints, y) {
  for (let i = 0; i < linePoints.length - 1; i++) {
    const p1 = linePoints[i];
    const p2 = linePoints[i + 1];

    const minY = Math.min(p1.y, p2.y);
    const maxY = Math.max(p1.y, p2.y);

    if (y >= minY && y <= maxY) {
      const dy = p2.y - p1.y;

      if (Math.abs(dy) < 0.0001) {
        return p1.x;
      }

      const t = (y - p1.y) / dy;
      return p1.x + (p2.x - p1.x) * t;
    }
  }

  return null;
}

function isTruckCompletelyBelowY(limitY) {
  const corners = getCorners(truck);

  return corners.every(p => p.y > limitY);
}

function updateCorrectionCounter() {
if (!correctionCounterStarted) {
  if (truck.x < 1400) {
    correctionCounterStarted = true;
  } else {
    return;
  }
}
  if (correctionCounterStopped) return;

  if (isTruckCompletelyBelowY(1300)) {
    correctionCounterStopped = true;
    return;
  }

  const isReversingNow = truck.speed < -0.05;
  const isDrivingForwardNow = truck.speed > 0.05;

  if (isReversingNow) {
    hasReversedOnce = true;
    wasReversing = true;
  }

  if (
    hasReversedOnce &&
    wasReversing &&
    isDrivingForwardNow
  ) {
    correctionMoves++;
    wasReversing = false;

    if (correctionMoves > 4) {
      crashed = true;
      crashReason = "ZU VIELE KORREKTURZÜGE!";
      truck.speed = 0;
      restartBtn.style.display = "block";
      controls.style.display = "none";
    }
  }
}


function checkRoadMarkingViolation() {
  const wheelPoints = getWheelTriggerPoints();

  const leftLine = buildLeftTriggerLine();
  const rightLine = buildRightTriggerLine();

  markingViolationPoint = null;

  for (const p of wheelPoints) {
    if (p.y < markingLimits.topLimit) {
      markingViolationPoint = p;
      return true;
    }

    const leftX = getBoundaryXAtY(leftLine, p.y);
    const rightX = getBoundaryXAtY(rightLine, p.y);

    const tireHalfWidth = 10;

// Spielfeldgrenzen links/rechts
if (p.x < -20) {
  markingViolationPoint = p;
  crashReason = "BEREICH VERLASSEN!";
  return true;
}

if (p.x > 3500) {
  markingViolationPoint = p;
  crashReason = "BEREICH VERLASSEN!";
  return true;
}

if (leftX !== null && p.x < leftX + tireHalfWidth - markingLimits.tolerance) {
  markingViolationPoint = p;
  return true;
}

if (rightX !== null && p.x > rightX - tireHalfWidth + markingLimits.tolerance) {
  markingViolationPoint = p;
  return true;
}
  }

  return false;
}

function updateTrailer() {

updateCorrectionCounter();

if (crashed) return;


  const hitchX =
    truck.x - Math.cos(truck.angle) * truck.length / 2;

  const hitchY =
    truck.y - Math.sin(truck.angle) * truck.length / 2;

  const frontAxleOffset = trailer.length / 2 - 25;

  // aktueller Drehschemelpunkt am Anhänger
  const currentFrontX =
    trailer.x + Math.cos(trailer.angle) * frontAxleOffset;

  const currentFrontY =
    trailer.y + Math.sin(trailer.angle) * frontAxleOffset;

  // Richtung vom Drehschemel zur Kupplung
  const dx = hitchX - currentFrontX;
  const dy = hitchY - currentFrontY;


  trailer.drawbarAngle = Math.atan2(dy, dx);

  // neuer Drehschemelpunkt mit fester Deichsellänge
  const newFrontAxleX =
    hitchX - Math.cos(trailer.drawbarAngle) * trailer.drawbarLength;

  const newFrontAxleY =
    hitchY - Math.sin(trailer.drawbarAngle) * trailer.drawbarLength;

  // Anhänger richtet sich direkt auf den neuen Drehschemelpunkt aus
  trailer.angle = Math.atan2(
    newFrontAxleY - trailer.y,
    newFrontAxleX - trailer.x
  );

  // Anhängerposition vom Drehschemelpunkt zurückrechnen
  trailer.x =
    newFrontAxleX - Math.cos(trailer.angle) * frontAxleOffset;

  trailer.y =
    newFrontAxleY - Math.sin(trailer.angle) * frontAxleOffset;

  trailer.frontAxleX = newFrontAxleX;
  trailer.frontAxleY = newFrontAxleY;

  trailer.rearAxleX =
    trailer.x + Math.cos(trailer.angle) * -90;

  trailer.rearAxleY =
    trailer.y + Math.sin(trailer.angle) * -90;
}
function getCorners(obj) {
  const c = Math.cos(obj.angle);
  const s = Math.sin(obj.angle);
  const hl = obj.length / 2;
  const hw = obj.width / 2;

  return [
    { x: obj.x + c * hl - s * hw, y: obj.y + s * hl + c * hw },
    { x: obj.x + c * hl + s * hw, y: obj.y + s * hl - c * hw },
    { x: obj.x - c * hl + s * hw, y: obj.y - s * hl - c * hw },
    { x: obj.x - c * hl - s * hw, y: obj.y - s * hl + c * hw }
  ];
}

function project(axis, points) {
  let min = points[0].x * axis.x + points[0].y * axis.y;
  let max = min;

  for (const p of points) {
    const val = p.x * axis.x + p.y * axis.y;
    min = Math.min(min, val);
    max = Math.max(max, val);
  }

  return { min, max };
}

function polygonsCollide(a, b) {
  const polygons = [a, b];

  for (const poly of polygons) {
    for (let i = 0; i < poly.length; i++) {
      const p1 = poly[i];
      const p2 = poly[(i + 1) % poly.length];

      const edge = { x: p2.x - p1.x, y: p2.y - p1.y };
      const axis = { x: -edge.y, y: edge.x };

      const len = Math.hypot(axis.x, axis.y);
      axis.x /= len;
      axis.y /= len;

      const pa = project(axis, a);
      const pb = project(axis, b);

      if (pa.max < pb.min || pb.max < pa.min) {
        return false;
      }
    }
  }

  return true;
}
function getDrawbarPolygon() {
  const hitchX = truck.x - Math.cos(truck.angle) * truck.length / 2;
  const hitchY = truck.y - Math.sin(truck.angle) * truck.length / 2;

const axleX = trailer.frontAxleX ?? trailer.x + Math.cos(trailer.angle) * (trailer.length / 2 - 25);
const axleY = trailer.frontAxleY ?? trailer.y + Math.sin(trailer.angle) * (trailer.length / 2 - 25);

  const width = 14;

  // Start etwas hinter der Kupplung, damit die normale Verbindung nicht sofort Kollision auslöst
  const startX = hitchX - Math.cos(trailer.drawbarAngle) * 55;
  const startY = hitchY - Math.sin(trailer.drawbarAngle) * 55;

  return [
    {
      x: startX + Math.cos(trailer.drawbarAngle + Math.PI / 2) * width,
      y: startY + Math.sin(trailer.drawbarAngle + Math.PI / 2) * width
    },
    {
      x: startX + Math.cos(trailer.drawbarAngle - Math.PI / 2) * width,
      y: startY + Math.sin(trailer.drawbarAngle - Math.PI / 2) * width
    },
    {
      x: axleX + Math.cos(trailer.drawbarAngle - Math.PI / 2) * width,
      y: axleY + Math.sin(trailer.drawbarAngle - Math.PI / 2) * width
    },
    {
      x: axleX + Math.cos(trailer.drawbarAngle + Math.PI / 2) * width,
      y: axleY + Math.sin(trailer.drawbarAngle + Math.PI / 2) * width
    }
  ];
}
function checkTruckTrailerCollision() {

  const truckPoly = getCorners(truck);
  const trailerPoly = getCorners(trailer);
  const drawbarPoly = getDrawbarPolygon();

  return (
    polygonsCollide(truckPoly, trailerPoly) ||
    polygonsCollide(truckPoly, drawbarPoly)
  );
}

function checkTaskCompleted() {
  if (taskCompleted) return false;

  const angle =
    ((truck.angle % (Math.PI * 2)) + Math.PI * 2) %
    (Math.PI * 2);

  const facingRight =
    angle < 0.5 || angle > (Math.PI * 2 - 0.5);

  const inTargetArea =
    truck.x > 2500 &&
    truck.y > 900 &&
    truck.y < 1300;

  return (
    truck.speed > 0.3 &&
    facingRight &&
    inTargetArea
  );
}

function drawRoad() {
  if (envLoaded) {
    ctx.drawImage(envImage, 0, 0, world.width, world.height);
  } else {
    drawFallbackRoad();
  }
}
function drawWheel(x, y, angle) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  ctx.fillStyle = "black";
  ctx.fillRect(-13, -5, 26, 10);
  ctx.restore();
}

function drawFallbackVehicle(obj, color) {
  ctx.save();
  ctx.translate(obj.x, obj.y);
  ctx.rotate(obj.angle);
  ctx.fillStyle = color;
  ctx.fillRect(-obj.length / 2, -obj.width / 2, obj.length, obj.width);
  ctx.strokeStyle = "black";
  ctx.lineWidth = 2;
  ctx.strokeRect(-obj.length / 2, -obj.width / 2, obj.length, obj.width);
  ctx.restore();
}


function drawSpriteImage(obj, imageCanvas) {
  ctx.save();
  ctx.translate(obj.x, obj.y);

  // Deine Fahrzeugbilder zeigen nach rechts.
  // Die Fahrphysik arbeitet ebenfalls nach rechts bei Winkel 0.
ctx.rotate(obj.angle + Math.PI);

ctx.drawImage(
    imageCanvas,
    -obj.length / 2,
    -obj.width / 2,
    obj.length,
    obj.width
);

  ctx.restore();
}

function drawTruck() {
  if (truckSpriteLoaded) {
    drawSpriteImage(truck, truckSpriteCanvas);
  } else {
    drawFallbackVehicle(truck, "white");
  }

ctx.save();
ctx.translate(truck.x, truck.y);
ctx.rotate(truck.angle);

  drawWheel(-95, -truck.width / 3 - 2, 0);
  drawWheel(-95, truck.width / 3 + 2, 0);
  drawWheel(-95, -truck.width / 5 - 5, 0);
  drawWheel(-95, truck.width / 5 + 5, 0);


  drawWheel(130, -truck.width / 3 - 2, truck.steeringAngle);
  drawWheel (130, truck.width / 3 + 2, truck.steeringAngle);

  ctx.restore();
}

function drawTrailer() {
 if (trailerSpriteLoaded) {
  ctx.save();
  ctx.translate(trailer.x, trailer.y);
  ctx.rotate(trailer.angle + Math.PI);

  ctx.drawImage(
    trailerSpriteCanvas,
    -trailer.length / 2,
    -trailer.width / 2,
    trailer.length,
    trailer.width
  );

  ctx.restore();
} else {
  drawFallbackVehicle(trailer, "green");
}
  ctx.save();
  ctx.translate(trailer.x, trailer.y);
  ctx.rotate(trailer.angle);

  drawWheel(-90, -trailer.width / 3 - 10, 0);
  drawWheel(-90, trailer.width / 3 + 10, 0);

  const frontAxleX = trailer.length / 2 - 25;
  const axleAngle = trailer.drawbarAngle - trailer.angle;

  ctx.save();
  ctx.translate(frontAxleX, 0);
  ctx.rotate(axleAngle);

  ctx.strokeStyle = "black";
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(0, -trailer.width / 2);
  ctx.lineTo(0, trailer.width / 2);
  ctx.stroke();

  drawWheel(0, -trailer.width / 3 - 10, 0);
  drawWheel(0, trailer.width / 3 + 10, 0);

  ctx.restore();
  ctx.restore();
}



function drawDrawbar() {
  const hitchX = truck.x - Math.cos(truck.angle) * truck.length / 2;
  const hitchY = truck.y - Math.sin(truck.angle) * truck.length / 2;

const axleX = trailer.frontAxleX ?? trailer.x + Math.cos(trailer.angle) * (trailer.length / 2 - 25);
const axleY = trailer.frontAxleY ?? trailer.y + Math.sin(trailer.angle) * (trailer.length / 2 - 25);

const pivotRadius = 19;

const leftX = axleX + Math.cos(trailer.drawbarAngle + Math.PI / 2) * pivotRadius;
const leftY = axleY + Math.sin(trailer.drawbarAngle + Math.PI / 2) * pivotRadius;

const rightX = axleX + Math.cos(trailer.drawbarAngle - Math.PI / 2) * pivotRadius;
const rightY = axleY + Math.sin(trailer.drawbarAngle - Math.PI / 2) * pivotRadius;

  ctx.beginPath();
  ctx.moveTo(hitchX, hitchY);
  ctx.lineTo(leftX, leftY);
  ctx.lineTo(rightX, rightY);
  ctx.closePath();


  ctx.strokeStyle = "black";
  ctx.lineWidth = 4;
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(hitchX, hitchY, 5, 0, Math.PI * 2);
  ctx.fillStyle = "black";
  ctx.fill();

ctx.beginPath();
ctx.arc(axleX, axleY, 19, 0, Math.PI * 2);

ctx.strokeStyle = "black";
ctx.lineWidth = 4;
ctx.stroke();
}

function drawHud() {

if (correctionBox) {
  correctionBox.innerText = "Korrekturzüge: " + correctionMoves + " / 4";
}

}

function drawCollisionOverlay() {
  ctx.fillStyle = "rgba(0,0,0,0.75)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.textAlign = "center";

  const isPortrait = canvas.height > canvas.width;

  ctx.fillStyle = "red";
  ctx.font = isPortrait ? "28px Arial" : "52px Arial";

  ctx.fillText(
    crashReason,
    canvas.width / 2,
    canvas.height / 2 - 80
  );

  ctx.fillStyle = "white";
  ctx.font = isPortrait ? "22px Arial" : "30px Arial";

  if (crashReason === "MARKIERUNG ÜBERFAHREN!") {

  ctx.fillText(
    "Du hast die Begrenzung",
    canvas.width / 2,
    canvas.height / 2 - 20
  );

  ctx.fillText(
    "der Aufgabe überfahren",
    canvas.width / 2,
    canvas.height / 2 + 20
  );

}
else if (crashReason === "BEREICH VERLASSEN!") {

  ctx.fillText(
    "Du hast den zulässigen",
    canvas.width / 2,
    canvas.height / 2 - 20
  );

  ctx.fillText(
    "Aufgabenbereich verlassen",
    canvas.width / 2,
    canvas.height / 2 + 20
  );

}
else if (crashReason === "ZU VIELE KORREKTURZÜGE!") {

  ctx.fillText(
    "Mehr als 4 Korrekturzüge",
    canvas.width / 2,
    canvas.height / 2 - 20
  );

  ctx.fillText(
    "verwendet",
    canvas.width / 2,
    canvas.height / 2 + 20
  );

}

else {

  ctx.fillText(
    "LKW hat den",
    canvas.width / 2,
    canvas.height / 2 - 20
  );

  ctx.fillText(
    "Anhänger berührt",
    canvas.width / 2,
    canvas.height / 2 + 20
  );

}


  ctx.textAlign = "left";
}

function formatTime(ms) {
  const totalSeconds = Math.floor(ms / 1000);
  const minutes = Math.floor(totalSeconds / 60);
  const seconds = totalSeconds % 60;

  return (
    String(minutes).padStart(2, "0") +
    ":" +
    String(seconds).padStart(2, "0")
  );
}

function drawSuccessOverlay() {

  ctx.fillStyle = "rgba(0,0,0,0.55)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const isPortrait = canvas.height > canvas.width;

  ctx.textAlign = "center";

  ctx.fillStyle = "#00ff44";

  ctx.font = isPortrait ? "28px Arial" : "52px Arial";

  ctx.fillText(
    "GRUNDFAHRAUFGABE",
    canvas.width / 2,
    canvas.height / 2 - 60
  );

  ctx.fillText(
    "ABGESCHLOSSEN",
    canvas.width / 2,
    canvas.height / 2
  );

  ctx.fillStyle = "white";

  ctx.font = isPortrait ? "18px Arial" : "28px Arial";

  ctx.fillText(
    "Gratulation",
    canvas.width / 2,
    canvas.height / 2 + 50
  );
const usedTime = finishTime
  ? formatTime(finishTime - startTime)
  : "00:00";

ctx.fillText(
  "Zeit: " + usedTime,
  canvas.width / 2,
  canvas.height / 2 + 95
);
  ctx.textAlign = "left";
}
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

 if (followTruck) {

  const hitchX =
    truck.x - Math.cos(truck.angle) * truck.length / 2;

  const hitchY =
    truck.y - Math.sin(truck.angle) * truck.length / 2;

  camera.x = hitchX;
  camera.y = hitchY + 100;
}

  ctx.save();

  ctx.translate(canvas.width / 2, canvas.height / 2);
  ctx.scale(camera.zoom, camera.zoom);
  ctx.translate(-camera.x, -camera.y);

drawRoad();
drawRoadTriggerDebug();






ctx.save();

ctx.strokeStyle = "white";
ctx.lineWidth = 4;

ctx.beginPath();
ctx.moveTo(1100, 975);
ctx.lineTo(2700, 975);

ctx.stroke();

ctx.restore();



ctx.strokeStyle = "white";
ctx.lineWidth = 4;

// Obere Linie
ctx.beginPath();
ctx.moveTo(1100, 975);
ctx.lineTo(2700, 975);
ctx.stroke();

// Linke waagerechte Linie
ctx.beginPath();
ctx.moveTo(1450, 1365);
ctx.lineTo(1100, 1365);
ctx.stroke();

// Rechte waagerechte Linie
ctx.beginPath();
ctx.moveTo(2280, 1365);
ctx.lineTo(2700, 1365);
ctx.stroke();

drawTrailer();
drawDrawbar();
drawTruck();

  ctx.restore();




  drawHud();

if (crashed) {
  drawCollisionOverlay();
}

if (taskCompleted) {
  drawSuccessOverlay();
}
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

<script>
  const menuScreen = document.getElementById('menuScreen');
  const gameScreen = document.getElementById('gameScreen');
  const gameFrame = document.getElementById('gameFrame');
  const backBtn = document.getElementById('backBtn');

  function startLevel(level) {
    const tpl = document.getElementById('tpl-' + level);
    if (!tpl) return;
    menuScreen.style.display = 'none';
    gameScreen.style.display = 'block';
    backBtn.style.display = 'block';
    gameFrame.srcdoc = tpl.innerHTML.trim();
  }

  function showMenu() {
    gameFrame.srcdoc = '';
    gameScreen.style.display = 'none';
    menuScreen.style.display = 'flex';
    backBtn.style.display = 'none';
  }
</script>
